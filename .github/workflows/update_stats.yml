name: Update Sports Stats

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC) — matches MCP server cron
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # PRIMARY: Call the MCP server to fetch stats and receive CSV data as JSON
      - name: Fetch stats from MCP server
        id: mcp_update
        continue-on-error: true
        env:
          MCP_SERVER_URL: ${{ secrets.MCP_SERVER_URL }}
          MCP_ADMIN_KEY: ${{ secrets.MCP_ADMIN_KEY }}
        run: |
          if [ -z "$MCP_SERVER_URL" ]; then
            echo "MCP_SERVER_URL secret not set — skipping MCP fetch, will use fallback scripts"
            exit 1
          fi

          echo "Calling MCP server at ${MCP_SERVER_URL}/api/update-stats ..."
          curl -s -X POST "${MCP_SERVER_URL}/api/update-stats" \
            -H "Content-Type: application/json" \
            -H "x-admin-key: ${MCP_ADMIN_KEY}" \
            -d '{"sport":"ALL"}' \
            --max-time 180 \
            -o /tmp/stats-response.json

          # Write the CSV files returned by the MCP server
          node -e "
            const fs = require('fs');
            const path = require('path');

            let data;
            try {
              data = JSON.parse(fs.readFileSync('/tmp/stats-response.json', 'utf8'));
            } catch (e) {
              console.error('Failed to parse MCP response:', e.message);
              process.exit(1);
            }

            if (!data.success) {
              console.error('MCP update failed:', data.error || 'unknown error');
              process.exit(1);
            }

            const sportDirs = {
              NBA: 'frontend/public/stats/nba',
              NFL: 'frontend/public/stats/nfl',
              NHL: 'frontend/public/stats/nhl',
            };

            let filesWritten = 0;
            for (const [sport, sportData] of Object.entries(data.sports || {})) {
              if (!sportData.success || !sportData.csvData) {
                console.warn(sport + ' update failed:', sportData.error);
                continue;
              }
              const dir = sportDirs[sport];
              fs.mkdirSync(dir, { recursive: true });
              for (const [filename, content] of Object.entries(sportData.csvData)) {
                fs.writeFileSync(path.join(dir, filename), content);
                filesWritten++;
              }
              console.log(sport + ': wrote ' + Object.keys(sportData.csvData).length + ' files');
            }
            console.log('Total files written:', filesWritten);
          "

      # FALLBACK: Run the local scripts if MCP server is unreachable
      - name: Fallback - Install backend dependencies
        if: steps.mcp_update.outcome == 'failure'
        run: cd backend && npm install

      - name: Fallback - Update NBA stats
        id: nba_fallback
        if: steps.mcp_update.outcome == 'failure'
        continue-on-error: true
        run: NODE_PATH=backend/node_modules node scripts/updateNBAStats.js

      - name: Fallback - Update NFL stats
        id: nfl_fallback
        if: steps.mcp_update.outcome == 'failure'
        continue-on-error: true
        run: NODE_PATH=backend/node_modules node scripts/updateNFLStats.js

      - name: Fallback - Update NHL stats
        id: nhl_fallback
        if: steps.mcp_update.outcome == 'failure'
        continue-on-error: true
        run: NODE_PATH=backend/node_modules node scripts/updateNHLStats.js

      - name: Commit and push updated CSV files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add frontend/public/stats/**/*.csv stats/*.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update NBA/NFL/NHL stats (automated) - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Report status
        if: always()
        run: |
          echo "### Stats Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Server | ${{ steps.mcp_update.outcome }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.mcp_update.outcome }}" == "failure" ]; then
            echo "| NBA Fallback | ${{ steps.nba_fallback.outcome }} |" >> $GITHUB_STEP_SUMMARY
            echo "| NFL Fallback | ${{ steps.nfl_fallback.outcome }} |" >> $GITHUB_STEP_SUMMARY
            echo "| NHL Fallback | ${{ steps.nhl_fallback.outcome }} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if all sources failed
        if: |
          steps.mcp_update.outcome == 'failure' &&
          steps.nba_fallback.outcome == 'failure' &&
          steps.nfl_fallback.outcome == 'failure' &&
          steps.nhl_fallback.outcome == 'failure'
        run: |
          echo "All stats update sources failed!"
          exit 1
