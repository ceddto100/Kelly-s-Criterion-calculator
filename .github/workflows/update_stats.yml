name: Update Sports Stats

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allow manual triggering

# Allow the default GITHUB_TOKEN to push the regenerated CSVs back to the repo.
# Without this, modern repos default the token to read-only and `git push` fails
# silently — a common reason a working stats updater quietly stops committing.
permissions:
  contents: write

# Never let two updater runs race on the same files / push.
concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd backend && npm install

      # Self-contained updaters (no external MCP server). Each writes CSVs to
      # frontend/public/stats/<sport>/. continue-on-error so one flaky source
      # never blocks the others.
      #   NBA: NBA.com (best; blocks cloud IPs) → ESPN team stats + ESPN standings
      #        for points-allowed (the standings feed is the cloud-friendly source)
      #   NFL: ESPN public API
      #   NHL: MoneyPuck (advanced) + ESPN (special teams)
      - name: Update NBA stats
        id: nba
        continue-on-error: true
        run: NODE_PATH=backend/node_modules node scripts/updateNBAStats.js

      - name: Update NFL stats
        id: nfl
        continue-on-error: true
        run: NODE_PATH=backend/node_modules node scripts/updateNFLStats.js

      - name: Update NHL stats
        id: nhl
        continue-on-error: true
        run: NODE_PATH=backend/node_modules node scripts/updateNHLStats.js

      # MLB advanced stats (wRC+/wOBA/FIP/xFIP/SIERA) from FanGraphs' JSON
      # leaders API, written to backend/data/mlb/ for the backend to merge into
      # /api/mlb/daily. Uses cloudscraper to handle Cloudflare challenge pages.
      # Best-effort (continue-on-error) like the
      # other sports: FanGraphs blanket-blocks cloud/CI IPs with a 403, and that
      # external block must never take down the NBA/NFL/NHL pipeline or the
      # freshness heartbeat. The MLB outcome is surfaced in the run summary
      # below, and the updater keeps the previous MLB files on failure.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MLB advanced dependencies
        run: python -m pip install cloudscraper

      - name: Update MLB advanced stats
        id: mlb_advanced
        # continue-on-error: FanGraphs returns 403 for cloud/CI IPs across the
        # whole domain, so without a logged-in session this fetch cannot succeed
        # from Actions. Letting it fail the job (the previous behavior) also
        # skipped the commit/push + freshness-heartbeat steps below, which
        # silently stalled the NBA/NFL/NHL updater and tripped the Check Stats
        # Freshness watchdog. To restore live MLB advanced data, add a repo
        # secret named FANGRAPHS_COOKIE with the Cookie header value from a
        # logged-in FanGraphs browser session; until then MLB gracefully falls
        # back to OPS/ERA (its long-standing default). The step still reports a
        # red X in the run summary so the failure stays visible.
        continue-on-error: true
        env:
          FANGRAPHS_COOKIE: ${{ secrets.FANGRAPHS_COOKIE }}
        run: python scripts/updateMLBAdvanced.py

      # Record when each sport's CSVs were actually refreshed (only advances a
      # sport's timestamp if its files changed this run) so the app and the
      # freshness check can tell how current the data is.
      - name: Write freshness manifest
        run: node scripts/writeStatsManifest.js

      - name: Commit and push updated CSV files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add frontend/public/stats stats backend/data 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update sports stats (automated) - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Report status
        if: always()
        run: |
          echo "### Stats Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Sport | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| NBA | ${{ steps.nba.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NFL | ${{ steps.nfl.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NHL | ${{ steps.nhl.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MLB (FanGraphs) | ${{ steps.mlb_advanced.outcome }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if all NBA/NFL/NHL updates failed
        if: |
          steps.nba.outcome == 'failure' &&
          steps.nfl.outcome == 'failure' &&
          steps.nhl.outcome == 'failure'
        run: |
          echo "All NBA/NFL/NHL stats updates failed!"
          exit 1
